<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韬略之道 · Tao of Strategy</title>
  <meta name="description" content="一枚硬币的两面：无为与战争 — 兵家进取与道家避世格言对比">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="home-page">

  <header>
    <h1>韬略之道</h1>
    <p class="subtitle">Tao of Strategy — <em>The one coin with two sides: Wuwei &amp; War</em></p>
  </header>

  <div class="container">

    <!-- Navigation -->
    <nav>
      <a href="index.html">🏠 首页</a>
      <a href="people/bingjia/sunzi.html">🏯 兵家</a>
      <a href="people/daojia/laozi.html">☯️ 道家</a>
      <a href="people/crossover/fanli.html">🔄 跨界</a>
      <a href="comparison.html">🪙 对比</a>
      <a href="topics/rou-gang.html">📚 主题</a>
      <a href="about.html">📖 关于</a>
      <a href="overview.html">📊 总览</a>
    </nav>

    <!-- Loading -->
    <div id="loading" style="text-align:center;padding:40px;color:var(--text-muted);">⏳ 加载格言中……</div>

    <!-- Daily Quote -->
    <section class="daily-section" id="dailySection">
      <div class="daily-header">
        <h2>📅 每日一面</h2>
        <span class="date-label" id="dateLabel"></span>
      </div>
      <div id="dailyQuote"></div>
    </section>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-row">
        <span class="filter-label">面</span>
        <button class="face-btn active-all" data-face="all">全部</button>
        <button class="face-btn" data-face="jin">⚔️🛡️ 进取</button>
        <button class="face-btn" data-face="bi">☯️ 避世</button>
        <button class="face-btn" data-face="zhuan">🔄 转化</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">筛选</span>
        <select class="filter-select" id="personSelect"></select>
        <select class="filter-select" id="tagSelect"></select>
      </div>
      <div class="filter-row">
        <span class="filter-label">操作</span>
        <button class="action-btn btn-random" id="randomBtn">🎲 随机一句</button>
        <button class="action-btn btn-daily" id="dailyBtn">📅 今日格言</button>
        <button class="action-btn" id="resetBtn" style="background:var(--border);color:var(--text-muted);font-size:0.82rem;">↺ 重置</button>
      </div>
    </div>

    <!-- Count -->
    <div class="count-info" id="countInfo">加载中……</div>

    <!-- Quote List -->
    <div class="quote-list" id="quoteList"></div>

  </div>

  <footer>
    <p>韬略之道 · Tao of Strategy — 一枚硬币的两面：无为与战争</p>
    <p><a href="https://github.com/">GitHub</a> · <a href="about.html">关于本项目</a></p>
  </footer>

  <script src="assets/js/app.js"></script>
  <script>
    document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('zh-CN', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });
  </script>
</body>
</html>
