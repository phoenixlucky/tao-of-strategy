# 韬略之道 · Tao of Strategy — GitHub Pages 配置

title: 韬略之道
description: 一枚硬币的两面：无为与战争 — 兵家进取与道家避世格言汇编
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# 包含所有目录
include:
  - people/
  - topics/
  - quotes/
  - assets/

# 不排除任何文件
exclude:
  - README.md
  - CONTRIBUTING.md

# 保持原样输出的文件
keep_files:
  - .git

# GitHub Pages 主题（不启用主题，使用自定义样式）
theme: null
